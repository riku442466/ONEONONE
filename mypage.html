<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymPro マイページ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f5f5f5;color:#222;min-height:100vh}
.topbar{background:#1a8fc7;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{color:#fff;font-size:16px;font-weight:700}
.topbar-user{color:rgba(255,255,255,0.9);font-size:12px;display:flex;align-items:center;gap:8px}
.logout-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:4px 10px;border-radius:12px;font-size:11px;cursor:pointer}
.page{display:none}.page.active{display:block}

/* 認証 */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#1a8fc7 0%,#0d6fa0 100%)}
.auth-logo{color:#fff;font-size:28px;font-weight:700;margin-bottom:6px}
.auth-sub{color:rgba(255,255,255,0.8);font-size:13px;margin-bottom:28px}
.auth-card{background:#fff;border-radius:16px;padding:28px 22px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,0.15)}

/* フォーム */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;color:#666;margin-bottom:5px;font-weight:500}
.fg label .req{color:#e24b4a;margin-left:2px;font-size:10px}
.fg input,.fg select{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:10px;font-size:14px;background:#fff;outline:none;font-family:inherit}
.fg input:focus,.fg select:focus{border-color:#1a8fc7;box-shadow:0 0 0 3px rgba(26,143,199,0.08)}
.fg .hint{font-size:11px;color:#aaa;margin-top:4px}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.err-msg{font-size:12px;color:#e24b4a;margin-top:6px;padding:8px 12px;background:#fff0f0;border-radius:8px;display:none}

/* 登録ステッパー */
.reg-progress{display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.reg-step-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.reg-step-dot.done{background:#4caf50;color:#fff}
.reg-step-dot.active{background:#1a8fc7;color:#fff}
.reg-step-dot.inactive{background:#f0f0f0;color:#aaa}
.reg-step-line{flex:1;height:2px;background:#eee;max-width:28px}
.reg-step-line.done{background:#4caf50}
.reg-title{font-size:16px;font-weight:700;margin-bottom:4px;color:#1a8fc7}
.reg-subtitle{font-size:12px;color:#888;margin-bottom:18px}

/* コース大タブ */
.course-tab-item{border:2px solid #ddd;border-radius:14px;overflow:hidden;cursor:pointer;margin-bottom:10px}
.course-tab-item.open{border-color:#1a8fc7}
.course-tab-header{display:flex;align-items:center;justify-content:space-between;padding:16px;background:#fff}
.course-tab-item.open .course-tab-header{background:#f0f8ff}
.course-tab-name{font-size:15px;font-weight:700;color:#333}
.course-tab-item.open .course-tab-name{color:#1a8fc7}
.course-tab-desc{font-size:12px;color:#888;margin-top:2px}
.course-tab-arrow{font-size:16px;color:#ccc;transition:transform .2s}
.course-tab-item.open .course-tab-arrow{transform:rotate(180deg);color:#1a8fc7}
.course-tab-body{display:none;padding:0 14px 14px;background:#f8fbff;border-top:1px solid #d8eef8}
.course-tab-item.open .course-tab-body{display:block}

/* プランカード */
.plan-card{border:1.5px solid #ddd;border-radius:12px;padding:14px;cursor:pointer;background:#fff;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.plan-card.selected{border-color:#1a8fc7;background:#e8f4fb}
.plan-radio{width:20px;height:20px;border-radius:50%;border:2px solid #ddd;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.plan-card.selected .plan-radio{border-color:#1a8fc7;background:#1a8fc7}
.plan-card.selected .plan-radio::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff}
.plan-info{flex:1}
.plan-name{font-size:14px;font-weight:700;color:#333}
.plan-card.selected .plan-name{color:#1a8fc7}
.plan-times{font-size:12px;color:#888;margin-top:2px}
.plan-price{font-size:16px;font-weight:700;color:#1a8fc7;flex-shrink:0}
.plan-price span{font-size:11px;color:#888;font-weight:400}
.plan-tag{display:inline-block;font-size:10px;background:#fff3d0;color:#f5a623;padding:2px 7px;border-radius:8px;margin-left:6px;font-weight:600}

/* トレーナー */
.trainer-opt{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid #ddd;border-radius:10px;cursor:pointer;background:#fff;margin-bottom:8px}
.trainer-opt.selected{border-color:#1a8fc7;background:#e8f4fb}
.trainer-avatar{width:40px;height:40px;border-radius:50%;background:#dbeeff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#0C447C;flex-shrink:0}

/* 確認 */
.confirm-section{margin-bottom:14px}
.confirm-section-title{font-size:11px;font-weight:700;color:#1a8fc7;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #e8f4fb}
.confirm-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid #f5f5f5}
.confirm-row:last-child{border-bottom:none}
.confirm-row .lbl{color:#888;min-width:100px;flex-shrink:0}
.confirm-row .val{font-weight:600;text-align:right;word-break:break-all}
.payment-box{background:linear-gradient(135deg,#1a8fc7,#0d6fa0);border-radius:14px;padding:20px;text-align:center;color:#fff;margin-top:4px}
.payment-box-price{font-size:32px;font-weight:700;margin:8px 0}
.btn-payment{width:100%;padding:16px;background:#fff;color:#1a8fc7;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:14px}

/* ボタン */
.btn-primary{width:100%;padding:14px;background:#1a8fc7;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-outline{width:100%;padding:13px;background:#fff;color:#1a8fc7;border:1.5px solid #1a8fc7;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-danger{width:100%;padding:13px;background:#fff;color:#e24b4a;border:1.5px solid #e24b4a;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-sm{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none}
.btn-sm.primary{background:#1a8fc7;color:#fff}
.btn-sm.outline{background:#fff;color:#1a8fc7;border:1.5px solid #1a8fc7}
.back-btn{background:none;border:none;color:#1a8fc7;font-size:13px;cursor:pointer;margin-bottom:12px;display:block}

/* アプリ */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;display:flex;z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,0.08)}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 10px;cursor:pointer;color:#aaa;font-size:10px;gap:3px;border:none;background:none}
.bottom-nav a.active{color:#1a8fc7}
.bottom-nav a .icon{font-size:22px}
.content{padding:16px;padding-bottom:80px}
.card{background:#fff;border-radius:14px;padding:18px 16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.card-title{font-size:13px;font-weight:600;color:#1a8fc7;margin-bottom:12px}
.course-badge{display:inline-block;background:#e8f4fb;color:#1a8fc7;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:10px}
.remain-box{background:linear-gradient(135deg,#1a8fc7,#0d6fa0);border-radius:12px;padding:16px;color:#fff;text-align:center;margin-bottom:10px}
.remain-num{font-size:40px;font-weight:700;line-height:1}
.remain-label{font-size:12px;opacity:0.85;margin-top:4px}
.remain-sub{font-size:11px;opacity:0.7;margin-top:2px}
.bk-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f0f0f0}
.bk-item:last-child{border-bottom:none}
.bk-date-box{background:#f0f8ff;border-radius:10px;padding:8px 10px;text-align:center;min-width:52px;flex-shrink:0}
.bk-date-m{font-size:10px;color:#1a8fc7;font-weight:500}
.bk-date-d{font-size:22px;font-weight:700;color:#1a8fc7;line-height:1}
.bk-date-w{font-size:10px;color:#888}
.bk-info{flex:1;min-width:0}
.bk-time{font-size:13px;font-weight:600;color:#333}
.bk-course{font-size:12px;color:#666;margin-top:2px}
.bk-trainer{font-size:11px;color:#aaa;margin-top:2px}
.bk-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.bk-action-btn{border:1px solid #ccc;background:#fff;padding:4px 8px;border-radius:7px;font-size:10px;cursor:pointer;white-space:nowrap}
.bk-action-btn.change{border-color:#1a8fc7;color:#1a8fc7}
.bk-action-btn.cancel{border-color:#e24b4a;color:#e24b4a}
.empty-msg{text-align:center;color:#aaa;font-size:13px;padding:24px 0}
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav{background:none;border:1px solid #ddd;border-radius:8px;padding:4px 12px;cursor:pointer;font-size:13px}
.cal-title-txt{font-size:15px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px}
.cal-dh{text-align:center;font-size:11px;color:#888;padding:4px 0;font-weight:500}
.cal-dh.sat{color:#1a8fc7}.cal-dh.sun{color:#e24b4a}
.cal-d{text-align:center;padding:6px 2px;border-radius:8px;cursor:pointer;font-size:13px}
.cal-d.today{background:#1a8fc7;color:#fff;font-weight:700}
.cal-d.selected{background:#e8f4fb;color:#1a8fc7;font-weight:700}
.slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.slot{border-radius:10px;padding:10px 4px;text-align:center;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid}
.slot.open{background:#e8f8e8;border-color:#4caf50;color:#1a5c1a}
.slot.full{background:#f5f5f5;border-color:#ddd;color:#bbb;cursor:default}
.slot.sel{background:#1a8fc7;border-color:#1a8fc7;color:#fff}
.slot-time{font-size:13px;font-weight:600;display:block}
.slot-status{font-size:10px;display:block;margin-top:2px}
.confirm-card-bk{background:#f0f8ff;border:1px solid #85B7EB;border-radius:12px;padding:16px;margin-bottom:16px}

/* プロフィール */
.profile-avatar{width:72px;height:72px;border-radius:50%;background:#dbeeff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#0C447C;margin:0 auto 12px}
.profile-name{text-align:center;font-size:18px;font-weight:700;margin-bottom:4px}
.profile-kana{text-align:center;font-size:12px;color:#888;margin-bottom:16px}
.profile-section{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #f0f0f0}
.profile-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.profile-section-title{font-size:12px;font-weight:600;color:#1a8fc7;margin-bottom:8px}
.profile-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.profile-row:last-child{border-bottom:none}
.profile-row .lbl{color:#888;flex-shrink:0;min-width:90px}
.profile-row .val{font-weight:500;text-align:right;word-break:break-all}
.status-badge{display:inline-flex;align-items:center;font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
.status-badge.confirmed{background:#e8f4fb;color:#1a8fc7}
.apply-box{background:#fffbf0;border:1px solid #ffd88a;border-radius:12px;padding:14px;margin-top:10px}
.apply-box-title{font-size:12px;font-weight:600;color:#f5a623;margin-bottom:8px}
.trainer-grid{display:grid;gap:6px}
.trainer-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid #ddd;border-radius:10px;cursor:pointer;background:#fff}
.trainer-row.selected{border-color:#1a8fc7;background:#e8f4fb}

/* チケット */
.ticket-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.ticket-row:last-child{border-bottom:none}
.ticket-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ticket-label{font-size:13px;font-weight:600;color:#333}
.ticket-desc{font-size:11px;color:#888;margin-top:2px}
.ticket-count{font-size:26px;font-weight:700;line-height:1}
.extra-box{background:linear-gradient(135deg,#f5a623,#e8920a);border-radius:14px;padding:16px;color:#fff;margin-bottom:12px}
.extra-box-title{font-size:13px;font-weight:700;margin-bottom:4px}
.extra-box-price{font-size:24px;font-weight:700;margin:6px 0 4px}
.btn-extra{width:100%;padding:12px;background:#fff;color:#e8920a;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.ticket-use-box{background:#e8f4fb;border:1.5px solid #1a8fc7;border-radius:12px;padding:14px;margin-bottom:12px}
.ticket-use-title{font-size:13px;font-weight:700;color:#1a8fc7;margin-bottom:6px}

/* ステップ */
.steps{display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:20px}
.step{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.step.active{background:#1a8fc7;color:#fff}
.step.done{background:#4caf50;color:#fff}
.step.inactive{background:#f0f0f0;color:#aaa}
.step-line{width:24px;height:2px;background:#eee}
.step-line.done{background:#4caf50}

/* その他 */
.notice-box{background:#f0f8ff;border-left:3px solid #1a8fc7;padding:10px 12px;border-radius:6px;font-size:12px;color:#444;margin-bottom:12px;line-height:1.6}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;white-space:nowrap}
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 20px 40px;max-height:90vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:#eee;border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;text-align:center}
.log-item{padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:12px}
.log-item:last-child{border-bottom:none}
.log-type{font-weight:600;font-size:11px;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:4px}
.log-type.reserved{background:#e8f4fb;color:#1a8fc7}
.log-type.changed{background:#fff3d0;color:#f5a623}
.log-type.cancelled{background:#ffe4e4;color:#e24b4a}
</style>
</head>
<body>

<!-- 認証ページ -->
<div id="page-auth" class="page active">
  <div class="auth-wrap">
    <div class="auth-logo">🏋️ GymPro</div>
    <div class="auth-sub">パーソナルトレーニング マイページ</div>
    <div class="auth-card">
      <div id="auth-body"></div>
    </div>
  </div>
</div>

<!-- メインアプリ -->
<div id="page-app" class="page">
  <div class="topbar">
    <div class="topbar-logo">🏋️ GymPro</div>
    <div class="topbar-user">
      <span id="topbar-name"></span>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </div>

  <div id="tab-home" class="content">
    <div class="card">
      <div class="card-title">📋 ご契約コース</div>
      <div id="home-course"></div>
    </div>
    <div class="card">
      <div class="card-title">📅 予約カレンダー</div>
      <div class="cal-nav-row">
        <button class="cal-nav" onclick="homeCalMove(-1)">＜</button>
        <span class="cal-title-txt" id="home-cal-title"></span>
        <button class="cal-nav" onclick="homeCalMove(1)">＞</button>
      </div>
      <div class="cal-grid" id="home-cal-grid"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;padding-top:8px;border-top:1px solid #f0f0f0;margin-top:4px">
        <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:#555"><span style="width:8px;height:8px;border-radius:50%;background:#1a8fc7;display:inline-block"></span>固定予約</div>
        <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:#555"><span style="width:8px;height:8px;border-radius:50%;background:#4caf50;display:inline-block"></span>通常予約</div>
        <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:#555"><span style="width:8px;height:8px;border-radius:50%;background:#f5a623;display:inline-block"></span>チケット</div>
        <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:#555"><span style="width:8px;height:8px;border-radius:50%;background:#e24b4a;display:inline-block"></span>エクストラ</div>
      </div>
      <div id="home-cal-detail" style="margin-top:12px"></div>
    </div>
    <div class="card">
      <div class="card-title">📋 次回のご予約</div>
      <div id="home-bookings"></div>
    </div>
    <button class="btn-primary" onclick="goTab('reserve')">＋ 予約を取る</button>
  </div>

  <div id="tab-reserve" class="content" style="display:none">
    <div class="card">
      <div class="card-title">📅 予約する</div>
      <div id="reserve-ticket-area"></div>
      <div id="reserve-step1" style="display:none">
        <div class="steps">
          <div class="step active">1</div><div class="step-line"></div>
          <div class="step inactive">2</div><div class="step-line"></div>
          <div class="step inactive">3</div>
        </div>
        <div class="cal-nav-row">
          <button class="cal-nav" onclick="calMove(-1)">＜</button>
          <span class="cal-title-txt" id="cal-title"></span>
          <button class="cal-nav" onclick="calMove(1)">＞</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div id="slot-section" style="display:none">
          <div id="slot-date-label" style="font-size:13px;font-weight:600;color:#333;margin-bottom:8px"></div>
          <div class="slot-grid" id="slot-grid"></div>
        </div>
      </div>
      <div id="reserve-step2" style="display:none">
        <div class="steps">
          <div class="step done">✓</div><div class="step-line done"></div>
          <div class="step active">2</div><div class="step-line"></div>
          <div class="step inactive">3</div>
        </div>
        <div style="font-size:11px;color:#888;margin-bottom:8px">トレーナーを選択</div>
        <div id="trainer-select-list"></div>
        <button class="btn-primary" onclick="reserveToConfirm()">次へ → 確認</button>
        <button class="btn-outline" onclick="showRsvStep(1)">← 戻る</button>
      </div>
      <div id="reserve-step3" style="display:none">
        <div class="steps">
          <div class="step done">✓</div><div class="step-line done"></div>
          <div class="step done">✓</div><div class="step-line done"></div>
          <div class="step active">3</div>
        </div>
        <div style="font-size:11px;color:#888;margin-bottom:8px">予約内容の確認</div>
        <div class="confirm-card-bk" id="confirm-content"></div>
        <button class="btn-primary" onclick="confirmReserve()">この内容で予約を確定する</button>
        <button class="btn-outline" onclick="showRsvStep(2)">← 戻る</button>
      </div>
    </div>
  </div>

  <div id="tab-history" class="content" style="display:none">
    <div class="card">
      <div class="card-title">📋 予約履歴・操作ログ</div>
      <div id="history-list"></div>
    </div>
  </div>

  <div id="tab-profile" class="content" style="display:none">
    <div id="profile-main"></div>
  </div>

  <nav class="bottom-nav">
    <a class="active" id="nav-home" onclick="goTab('home')"><span class="icon">🏠</span>ホーム</a>
    <a id="nav-history" onclick="goTab('history')"><span class="icon">📋</span>履歴</a>
    <a id="nav-profile" onclick="goTab('profile')"><span class="icon">👤</span>マイページ</a>
  </nav>
</div>

<!-- 変更モーダル -->
<div class="modal-bg" id="change-modal">

    </div>`;
}

function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-err');
  const account = ACCOUNTS.find(a => a.loginEmail === email && a.password === pass);
  if (!account) { errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  S.user = JSON.parse(JSON.stringify(account.user));
  showApp();
}

function doLogout() {
  S.user = null;
  document.getElementById('page-app').classList.remove('active');
  document.getElementById('page-auth').classList.add('active');
  renderLogin();
}

function showApp() {
  document.getElementById('page-auth').classList.remove('active');
  document.getElementById('page-app').classList.add('active');
  document.getElementById('topbar-name').textContent = `${S.user.name1} ${S.user.name2}さん`;
  goTab('home');
}

============================================================ */
function startRegister() {
  S.regStep = 1;
  S.regData = {};
  S.regOpenCourseId = null;
  renderRegister();
}

function renderRegister() {
  const step = S.regStep;
  const d    = S.regData;
  const total = 6;

  // プログレスバー
  let progress = '<div class="reg-progress">';
  for (let i = 1; i <= total; i++) {
    if (i > 1) progress += `<div class="reg-step-line${i <= step ? ' done' : ''}"></div>`;
    const cls = i < step ? 'done' : i === step ? 'active' : 'inactive';
    progress += `<div class="reg-step-dot ${cls}">${i < step ? '✓' : i}</div>`;
  }
  progress += '</div>';

  const titles    = ['基本情報','連絡先・住所','アカウント設定','プラン選択','トレーナー指名','登録内容の確認'];
  const subtitles = [
    'お名前・生年月日などを入力してください',
    '電話番号・メール・住所を入力してください',
    'ログインに使うメールとパスワードを設定してください',
    'ご希望のコース・プランを選択してください',
    '担当トレーナーを選択してください（後から変更申請可）',
    '内容を確認して決済へ進んでください',
  ];

  const backToLogin = step === 1
    ? `<button class="back-btn" onclick="renderLogin()">← ログインに戻る</button>`
    : '';

  let body = '';

  if (step === 1) {
    body = `
      <div class="fg-row">
        <div class="fg"><label>姓（漢字）<span class="req">*</span></label><input id="r-n1" value="${d.name1||''}" placeholder="山田"></div>
        <div class="fg"><label>名（漢字）<span class="req">*</span></label><input id="r-n2" value="${d.name2||''}" placeholder="太郎"></div>
      </div>
      <div class="fg-row">
        <div class="fg"><label>姓（フリガナ）<span class="req">*</span></label><input id="r-k1" value="${d.kana1||''}" placeholder="ヤマダ"></div>
        <div class="fg"><label>名（フリガナ）<span class="req">*</span></label><input id="r-k2" value="${d.kana2||''}" placeholder="タロウ"></div>
      </div>
      <div class="fg"><label>性別<span class="req">*</span></label>
        <select id="r-gd">${['','男性','女性','その他'].map(g=>`<option value="${g}"${d.gender===g?' selected':''}>${g||'選択してください'}</option>`).join('')}</select>
      </div>
      <div class="fg"><label>生年月日<span class="req">*</span></label><input type="date" id="r-br" value="${d.birth||''}"></div>
      <button class="btn-primary" onclick="regNext1()">次へ</button>`;
  }

  if (step === 2) {
    body = `
      <div class="fg"><label>電話番号<span class="req">*</span></label><input type="tel" id="r-p1" value="${d.phone1||''}" placeholder="090-0000-0000"></div>
      <div class="fg"><label>電話番号2（任意）</label><input type="tel" id="r-p2" value="${d.phone2||''}" placeholder="サブ番号"></div>
      <div class="fg"><label>連絡用メール<span class="req">*</span></label><input type="email" id="r-em1" value="${d.email1||''}" placeholder="example@email.com"><div class="hint">予約確認・お知らせに使用します</div></div>
      <div class="fg"><label>連絡用メール2（任意）</label><input type="email" id="r-em2" value="${d.email2||''}" placeholder="サブメール"></div>
      <div class="fg"><label>郵便番号</label>
        <div style="display:flex;gap:8px"><input id="r-zip" value="${d.zip||''}" placeholder="000-0000" style="flex:1"><button class="btn-sm primary" onclick="regAutoAddr()" style="padding:10px 12px;white-space:nowrap">住所検索</button></div>
      </div>
      <div class="fg"><label>住所1（都道府県・市区町村）</label><input id="r-a1" value="${d.address1||''}" placeholder="愛知県名古屋市中区"></div>
      <div class="fg"><label>住所2（番地・建物名）</label><input id="r-a2" value="${d.address2||''}" placeholder="栄1-2-3 ○○ビル101"></div>
      <button class="btn-primary" onclick="regNext2()">次へ</button>
      <button class="btn-outline" onclick="regGo(1)">← 戻る</button>`;
  }

  if (step === 3) {
    body = `
      <div class="notice-box">ログインに使用するメールアドレスとパスワードを設定してください。</div>
      <div class="fg"><label>ログイン用メール<span class="req">*</span></label><input type="email" id="r-le" value="${d.loginEmail||d.email1||''}" placeholder="example@email.com"></div>
      <div class="fg"><label>パスワード<span class="req">*</span></label><input type="password" id="r-pw1" placeholder="8文字以上"><div class="hint">英数字8文字以上</div></div>
      <div class="fg"><label>パスワード（確認）<span class="req">*</span></label><input type="password" id="r-pw2" placeholder="もう一度入力"></div>
      <button class="btn-primary" onclick="regNext3()">次へ</button>
      <button class="btn-outline" onclick="regGo(2)">← 戻る</button>`;
  }

  if (step === 4) {
    const tabs = COURSE_PLANS.map(cp => {
      const isOpen = S.regOpenCourseId === cp.courseId;
      const planRows = cp.plans.map(p => {
        const isSel = d.planId === p.id;
        return `<div class="plan-card${isSel?' selected':''}" onclick="regSelectPlan(${cp.courseId},${p.id})">
          <div class="plan-radio"></div>
          <div class="plan-info">
            <div class="plan-name">${p.name}${p.tags.map(t=>`<span class="plan-tag">${t}</span>`).join('')}</div>
            <div class="plan-times">月${p.times}回・${cp.dur}分／回</div>
          </div>
          <div class="plan-price">¥${p.price.toLocaleString()}<span>／月</span></div>
        </div>`;
      }).join('');
      return `<div class="course-tab-item${isOpen?' open':''}" onclick="regToggleCourse(event,${cp.courseId})">
        <div class="course-tab-header">
          <div>
            <div class="course-tab-name">${cp.courseName}</div>
            <div class="course-tab-desc">${cp.courseDesc}　${cp.dur}分</div>
          </div>
          <div class="course-tab-arrow">▼</div>
        </div>
        <div class="course-tab-body" onclick="event.stopPropagation()">${planRows}</div>
      </div>`;
    }).join('');
    body = `
      ${tabs}
      <button class="btn-primary" onclick="regNext4()">次へ</button>
      <button class="btn-outline" onclick="regGo(3)">← 戻る</button>`;
  }

  if (step === 5) {
    const trOpts = `
      <div class="trainer-opt${d.trainerId===0?' selected':''}" onclick="regSelectTrainer(0)">
        <div class="trainer-avatar" style="background:#f0f0f0;color:#888">？</div>
        <div><div style="font-size:14px;font-weight:600">指名なし（おまかせ）</div><div style="font-size:12px;color:#888">空いているトレーナーが担当します</div></div>
      </div>
      ${TRAINERS.map(tr=>`
        <div class="trainer-opt${d.trainerId===tr.id?' selected':''}" id="reg-tr-${tr.id}" onclick="regSelectTrainer(${tr.id})">
          <div class="trainer-avatar">${tr.name.slice(0,2)}</div>
          <div>
            <div style="font-size:14px;font-weight:600">${tr.name}トレーナー</div>
            <div style="font-size:12px;color:#888">${tr.role}</div>
            <div style="font-size:11px;color:#f5a623">指名料 +¥${tr.nomFee.toLocaleString()}／回</div>
          </div>
        </div>`).join('')}`;
    body = `
      <div class="notice-box">指名トレーナーは登録後も変更申請できます。</div>
      ${trOpts}
      <button class="btn-primary" onclick="regNext5()">次へ → 確認</button>
      <button class="btn-outline" onclick="regGo(4)">← 戻る</button>`;
  }

  if (step === 6) {
    const cp = COURSE_PLANS.find(c => c.plans.some(p => p.id === d.planId));
    const pl = cp ? cp.plans.find(p => p.id === d.planId) : null;
    const tr = TRAINERS.find(t => t.id === d.trainerId);
    body = `
      <div class="confirm-section">
        <div class="confirm-section-title">👤 基本情報</div>
        <div class="confirm-row"><span class="lbl">お名前</span><span class="val">${d.name1} ${d.name2}（${d.kana1} ${d.kana2}）</span></div>
        <div class="confirm-row"><span class="lbl">性別</span><span class="val">${d.gender}</span></div>
        <div class="confirm-row"><span class="lbl">生年月日</span><span class="val">${d.birth}</span></div>
      </div>
      <div class="confirm-section">
        <div class="confirm-section-title">📞 連絡先・住所</div>
        <div class="confirm-row"><span class="lbl">電話番号</span><span class="val">${d.phone1}</span></div>
        <div class="confirm-row"><span class="lbl">連絡用メール</span><span class="val">${d.email1}</span></div>
        <div class="confirm-row"><span class="lbl">住所</span><span class="val">${d.zip?`〒${d.zip} `:''}${d.address1||''}${d.address2?' '+d.address2:''}</span></div>
      </div>
      <div class="confirm-section">
        <div class="confirm-section-title">🔑 アカウント</div>
        <div class="confirm-row"><span class="lbl">ログインメール</span><span class="val">${d.loginEmail}</span></div>
        <div class="confirm-row"><span class="lbl">パスワード</span><span class="val">••••••••</span></div>
      </div>
      <div class="confirm-section">
        <div class="confirm-section-title">📋 コース・プラン・トレーナー</div>
        <div class="confirm-row"><span class="lbl">コース</span><span class="val">${cp?cp.courseName:''}</span></div>
        <div class="confirm-row"><span class="lbl">プラン</span><span class="val">${pl?pl.name:''}</span></div>
        <div class="confirm-row"><span class="lbl">担当トレーナー</span><span class="val">${tr?tr.name+'トレーナー':'指名なし'}</span></div>
      </div>
      <div class="payment-box">
        <div style="font-size:14px;font-weight:600;margin-bottom:4px">毎月のお支払い金額</div>
        <div class="payment-box-price">¥${pl?pl.price.toLocaleString():'—'}<span style="font-size:14px;font-weight:400">／月（税込）</span></div>
        <div style="font-size:11px;opacity:0.8;margin-bottom:0">次のページでカード情報を入力してください</div>
        <button class="btn-payment" onclick="goToPayment()">💳 決済ページへ進む</button>
      </div>
      <button class="btn-outline" onclick="regGo(5)" style="margin-top:10px">← 戻る</button>`;
  }

  document.getElementById('auth-body').innerHTML =
    backToLogin + progress +
    `<div class="reg-title">${titles[step-1]}</div>` +
    `<div class="reg-subtitle">${subtitles[step-1]}</div>` +
    body;
}

function regGo(step) { S.regStep = step; renderRegister(); }

function regToggleCourse(e, courseId) {
  e.stopPropagation();
  S.regOpenCourseId = S.regOpenCourseId === courseId ? null : courseId;
  renderRegister();
}

function regSelectPlan(courseId, planId) {
  S.regData.planId = planId;
  S.regOpenCourseId = courseId;
  renderRegister();
}

function regSelectTrainer(id) {
  S.regData.trainerId = id;
  renderRegister();
}

function regAutoAddr() {
  const zip = (document.getElementById('r-zip').value || '').replace('-', '');
  if (zip.length !== 7) { toast('郵便番号は7桁で入力してください'); return; }
  const map = {'4600008':'愛知県名古屋市中区栄','1000001':'東京都千代田区千代田','5300001':'大阪府大阪市北区梅田'};
  const addr = map[zip];
  if (addr) { document.getElementById('r-a1').value = addr; toast('✓ 住所を入力しました（デモ）'); }
  else toast('該当する住所が見つかりません');
}

function regNext1() {
  const d = S.regData;
  d.name1  = document.getElementById('r-n1').value.trim();
  d.name2  = document.getElementById('r-n2').value.trim();
  d.kana1  = document.getElementById('r-k1').value.trim();
  d.kana2  = document.getElementById('r-k2').value.trim();
  d.gender = document.getElementById('r-gd').value;
  d.birth  = document.getElementById('r-br').value;
  if (!d.name1||!d.name2||!d.kana1||!d.kana2) { toast('氏名・フリガナを入力してください'); return; }
  if (!d.gender) { toast('性別を選択してください'); return; }
  if (!d.birth)  { toast('生年月日を入力してください'); return; }
  regGo(2);
}

function regNext2() {
  const d = S.regData;
  d.phone1   = document.getElementById('r-p1').value.trim();
  d.phone2   = document.getElementById('r-p2').value.trim();
  d.email1   = document.getElementById('r-em1').value.trim();
  d.email2   = document.getElementById('r-em2').value.trim();
  d.zip      = document.getElementById('r-zip').value.trim();
  d.address1 = document.getElementById('r-a1').value.trim();
  d.address2 = document.getElementById('r-a2').value.trim();
  if (!d.phone1)                       { toast('電話番号を入力してください'); return; }
  if (!d.email1||!d.email1.includes('@')) { toast('正しいメールアドレスを入力してください'); return; }
  regGo(3);
}

function regNext3() {
  const d   = S.regData;
  d.loginEmail = document.getElementById('r-le').value.trim();
  const pw1 = document.getElementById('r-pw1').value;
  const pw2 = document.getElementById('r-pw2').value;

  if (pw1 !== pw2)     { toast('パスワードが一致しません'); return; }
  if (ACCOUNTS.find(a => a.loginEmail === d.loginEmail)) { toast('このメールアドレスはすでに登録されています'); return; }
  d.password = pw1;
  regGo(4);
}

function regNext4() {
  if (!S.regData.planId) { toast('プランを選択してください'); return; }
  regGo(5);
}

function regNext5() {

}

function goTab(name) {
  ['home','reserve','history','profile'].forEach(t => {
    const el  = document.getElementById('tab-'+t);
    const nav = document.getElementById('nav-'+t);

    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">

function bkItemHtml(b, showActions) {

}

/* ============================================================
   ホームカレンダー
============================================================ */
function homeCalMove(d) { homeCalOffset += d; renderHomeCal(); }

function renderHomeCal() {
  const now = new Date(); now.setMonth(now.getMonth() + homeCalOffset);
  const y = now.getFullYear(), m = now.getMonth();
  document.getElementById('home-cal-title').textContent = `${y}年${m+1}月`;
  const first = new Date(y,m,1), last = new Date(y,m+1,0), sd = first.getDay();

  // 固定予約日
  const fixedDates = {};
  for (let dd = 1; dd <= last.getDate(); dd++) {
    const dt = new Date(y,m,dd);
    FIXED_BOOKINGS.forEach(fb => { if (fb.dow === dt.getDay()) fixedDates[fmtDate(dt)] = fb; });
  }
  // 通常予約日（useTypeで色分け）
  const normalDates = {};
  bookings.filter(b => b.status === 'confirmed').forEach(b => {
    const bd = new Date(b.date);
    if (bd.getFullYear() === y && bd.getMonth() === m) {
      const color = b.useType === 'extra' ? '#e24b4a' : b.useType === 'ticket' ? '#f5a623' : '#4caf50';
      normalDates[b.date] = color;
    }
  });

  let h = '';
  ['日','月','火','水','木','金','土'].forEach((d,i) =>
    h += `<div class="cal-dh${i===0?' sun':i===6?' sat':''}">${d}</div>`);
  for (let i = 0; i < sd; i++) h += `<div class="cal-d"></div>`;
  for (let dd = 1; dd <= last.getDate(); dd++) {
    const ds = fmtDate(new Date(y,m,dd));
    const isFixed = !!fixedDates[ds];
    const normColor = normalDates[ds];
    const dot = isFixed ? '#1a8fc7' : normColor || 'transparent';
    const isToday = ds === TODAY, isPast = ds < TODAY;
    h += `<div class="cal-d${isToday?' today':''}" style="${isPast?'opacity:0.4':''}" onclick="showHomeCalDetail('${ds}')">
      ${dd}<span style="display:block;width:6px;height:6px;border-radius:50%;background:${dot};margin:2px auto 0"></span></div>`;
  }
  document.getElementById('home-cal-grid').innerHTML = h;
  document.getElementById('home-cal-detail').innerHTML = '';
}

function showHomeCalDetail(ds) {
  const d = new Date(ds), dow = d.getDay();
  const fixed  = FIXED_BOOKINGS.filter(fb => fb.dow === dow);
  const normal = bookings.filter(b => b.date === ds && b.status === 'confirmed');
  const isPast = ds < TODAY;
  let html = `<div style="font-size:13px;font-weight:600;color:#333;margin-bottom:8px">${d.getMonth()+1}月${d.getDate()}日（${WDAYS[dow]}）の予約</div>`;
  if (!fixed.length && !normal.length)
    html += `<div style="font-size:12px;color:#aaa;text-align:center;padding:8px 0">予約はありません</div>`;
  fixed.forEach(fb =>
    html += `<div style="padding:10px 12px;background:#e8f4fb;border-radius:10px;margin-bottom:6px;font-size:13px;font-weight:600;color:#1a8fc7">${fb.time}〜　固定予約　<span style="font-size:11px;color:#555;font-weight:400">${fb.courseName}</span></div>`);
  normal.forEach(b =>
    html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#e8f8e8;border-radius:10px;margin-bottom:6px">
      <div style="font-size:13px;font-weight:600;color:#3B6D11">${b.time}〜　通常予約</div>
      ${!isPast?`<div style="display:flex;gap:4px"><button class="bk-action-btn change" onclick="openChangeModal(${b.id})">変更</button><button class="bk-action-btn cancel" onclick="openCancelModal(${b.id})">取消</button></div>`:''}
    </div>`);
  document.getElementById('home-cal-detail').innerHTML = html;
}

function changeCalMove(d) { S.changeCalOffset += d; renderChangeCal(); }

function renderChangeCal() {

  const y = now.getFullYear(), m = now.getMonth();
  document.getElementById('change-cal-title').textContent = `${y}年${m+1}月`;

  ['日','月','火','水','木','金','土'].forEach((d,i) =>

function selectChangeDate(ds) {

  document.getElementById('change-slot-label').textContent = `${d.getMonth()+1}月${d.getDate()}日（${WDAYS[d.getDay()]}）`;

function selectChangeTime(t) {

      el.className = 'slot ' + (el.querySelector('.slot-time').textContent === t ? 'sel' : 'open');

  document.getElementById('change-confirm-btn').style.display = 'block';
}

function confirmChange() {
  const b = bookings.find(x => x.id === S.changingBkId);
  opLogs.unshift({type:'changed', date:TODAY, bkDate:S.changeDate, time:S.changeTime, courseName:b.courseName, trainerName:b.trainerId?b.trainerName:'おまかせ', note:`${b.date} ${b.time}〜 から変更`});

  document.getElementById('cancel-modal-body').innerHTML = `

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

/* ============================================================
   予約フロー
============================================================ */
function renderReserve() {
  S.rsvCourseId = S.user.contract.courseId;
  S.rsvDate = null; S.rsvTime = null; S.rsvTrainerId = null;
  S.rsvCalOffset = 0; S.rsvUseTicket = false; S.rsvUseExtra = false;

  const c = S.user.contract, remain = c.times - c.used;
  const tickets = S.user.tickets || [];
  const personalTk = tickets.find(t => t.typeId === 'personal');
  const personalRemain = personalTk ? personalTk.remaining : 0;
  const cp = COURSE_PLANS.find(x => x.courseId === c.courseId);
  const pl = cp ? cp.plans.find(p => p.id === c.planId) : null;
  const unitPrice = pl ? Math.floor(pl.price / c.times) : 0;

  const canNormal = remain > 0;
  const canTicket = remain === 0 && personalRemain > 0;
  const canExtra  = remain === 0 && personalRemain === 0;

  let ticketArea = '';
  if (canTicket) {
    S.rsvUseTicket = true;
    ticketArea = `<div class="ticket-use-box">
      <div class="ticket-use-title">🎫 パーソナルチケットで予約する</div>
      <div style="font-size:12px;color:#444;margin-bottom:4px">残り <strong style="font-size:16px;color:#1a8fc7">${personalRemain}</strong> 枚　全コース・全時間対応</div>
      <div style="font-size:11px;color:#888">今月の予約回数を使い切りました。チケットでそのまま予約できます</div>
    </div>`;
  }
  if (canExtra) {
    ticketArea = `<div class="extra-box">
      <div class="extra-box-title">⚡ エクストラチケットで追加予約</div>
      <div style="font-size:12px;opacity:0.9;margin-bottom:6px">今月の予約回数・チケットをすべて使い切りました</div>
      <div class="extra-box-price">¥${unitPrice.toLocaleString()}<span style="font-size:13px;font-weight:400;opacity:0.85">／回（1回単価）</span></div>
      <div style="font-size:11px;opacity:0.85;margin-bottom:0">※ ${pl?pl.name:''} ¥${pl?pl.price.toLocaleString():'—'} ÷ ${c.times}回 = ¥${unitPrice.toLocaleString()}／回</div>
      <button class="btn-extra" onclick="goExtraPayment()">💳 追加料金を支払って予約する</button>
    </div>`;
  }
  if (!canNormal && !canTicket && !canExtra) {
    ticketArea = `<div style="background:#fff3d0;border:1px solid #ffd88a;border-radius:12px;padding:14px;text-align:center;color:#f5a623;font-size:13px;font-weight:600;margin-bottom:12px">今月の予約はすべて使い切っています</div>`;
  }

  document.getElementById('reserve-ticket-area').innerHTML = ticketArea;

  if (canNormal || canTicket) {
    showRsvStep(1);
    renderCal();
  } else {
    [1,2,3].forEach(i => document.getElementById('reserve-step'+i).style.display = 'none');
  }
}

}

function goExtraPayment() {

    S.rsvUseExtra = true;

function calMove(d) { S.rsvCalOffset += d; renderCal(); }

function renderCal() {
  const now = new Date(); now.setMonth(now.getMonth() + S.rsvCalOffset);
  const y = now.getFullYear(), m = now.getMonth();
  document.getElementById('cal-title').textContent = `${y}年${m+1}月`;
  const first = new Date(y,m,1), last = new Date(y,m+1,0), sd = first.getDay();
  let h = '';
  ['日','月','火','水','木','金','土'].forEach((d,i) =>
    h += `<div class="cal-dh${i===0?' sun':i===6?' sat':''}">${d}</div>`);

  for (let dd = 1; dd <= last.getDate(); dd++) {
    const ds = fmtDate(new Date(y,m,dd));
    const booked = BOOKED_SLOTS[ds] || [], rate = booked.length / 22;
    const isSel = ds === S.rsvDate, isToday = ds === TODAY, isPast = ds < TODAY;
    h += `<div class="cal-d${isToday&&!isSel?' today':isSel?' selected':''}" style="${isPast?'opacity:0.3;cursor:default':'cursor:pointer'}" onclick="${isPast?'':'selectRsvDate(\''+ds+'\')'}">${dd}<span style="display:block;width:6px;height:6px;border-radius:50%;background:${rate===0?'#4caf50':rate<0.7?'#f5a623':'#e24b4a'};margin:2px auto 0;opacity:${rate===0?0:1}"></span></div>`;
  }
  document.getElementById('cal-grid').innerHTML = h;
  if (S.rsvDate) renderSlots(S.rsvDate);

function selectRsvDate(ds) {
  S.rsvDate = ds; S.rsvTime = null;
  renderCal();
  renderSlots(ds);
  document.getElementById('slot-section').style.display = 'block';
}

function renderSlots(ds) {
  const d = new Date(ds);
  document.getElementById('slot-date-label').textContent = `${d.getMonth()+1}月${d.getDate()}日（${WDAYS[d.getDay()]}）の空き時間`;
  const booked = BOOKED_SLOTS[ds] || [];
  const times = [];
  for (let h = 9; h < 20; h++) { times.push(`${String(h).padStart(2,'0')}:00`); times.push(`${String(h).padStart(2,'0')}:30`); }
  document.getElementById('slot-grid').innerHTML = times.map(t => {
    const isBooked = booked.includes(t), isSel = t === S.rsvTime;
    return `<div class="slot${isBooked?' full':isSel?' sel':' open'}" onclick="${isBooked?'':'selectRsvTime(\''+t+'\')'}" ><span class="slot-time">${t}</span><span class="slot-status">${isBooked?'×':'○'}</span></div>`;
  }).join('');
}

function selectRsvTime(t) {
  S.rsvTime = t;
  renderSlots(S.rsvDate);
  setTimeout(() => { showRsvStep(2); renderTrainerSelectR(); }, 300);
}

function renderTrainerSelectR() {
  document.getElementById('trainer-select-list').innerHTML =
    `<div class="trainer-opt${S.rsvTrainerId===0?' selected':''}" onclick="selectRsvTrainer(0)">
      <div class="trainer-avatar" style="background:#f0f0f0;color:#888">？</div>
      <div><div style="font-size:13px;font-weight:600">指名なし（おまかせ）</div><div style="font-size:12px;color:#888">空いているトレーナーが担当</div></div>
    </div>` +
    TRAINERS.map(tr => {
      const isNom = tr.id === S.user.nominatedTrainerId;
      return `<div class="trainer-opt${tr.id===S.rsvTrainerId?' selected':''}" onclick="selectRsvTrainer(${tr.id})">
        <div class="trainer-avatar">${tr.name.slice(0,2)}</div>
        <div>

function reserveToConfirm() {
  if (S.rsvTrainerId === null) { toast('トレーナーを選択してください'); return; }
  showRsvStep(3);
  const cp  = COURSE_PLANS.find(c => c.courseId === S.rsvCourseId);
  const tr  = TRAINERS.find(t => t.id === S.rsvTrainerId);
  const d   = new Date(S.rsvDate);
  const useLabel = S.rsvUseExtra ? '⚡ エクストラチケット' : S.rsvUseTicket ? '🎫 パーソナルチケット' : '通常予約';
  document.getElementById('confirm-content').innerHTML = `
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #ddd;font-size:13px"><span style="color:#666">予約種別</span><span style="font-weight:600">${useLabel}</span></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #ddd;font-size:13px"><span style="color:#666">日時</span><span style="font-weight:600">${d.getMonth()+1}月${d.getDate()}日（${WDAYS[d.getDay()]}）${S.rsvTime}〜</span></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #ddd;font-size:13px"><span style="color:#666">コース</span><span style="font-weight:600">${cp?cp.courseName:''}</span></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px"><span style="color:#666">トレーナー</span><span style="font-weight:600">${tr?tr.name:'おまかせ'}</span></div>`;
}

function confirmReserve() {
  const cp = COURSE_PLANS.find(c => c.courseId === S.rsvCourseId);
  const tr = TRAINERS.find(t => t.id === S.rsvTrainerId);
  const useType = S.rsvUseExtra ? 'extra' : S.rsvUseTicket ? 'ticket' : 'normal';
  bookings.push({id:nid++, date:S.rsvDate, time:S.rsvTime, courseId:S.rsvCourseId,
    courseName:cp?cp.courseName:'', trainerId:S.rsvTrainerId||null,
    trainerName:tr?tr.name:'おまかせ', status:'confirmed', useType});
  if (!BOOKED_SLOTS[S.rsvDate]) BOOKED_SLOTS[S.rsvDate] = [];
  BOOKED_SLOTS[S.rsvDate].push(S.rsvTime);
  if      (useType === 'normal') { S.user.contract.used++; }
  else if (useType === 'ticket') {
    const tk = S.user.tickets.find(t => t.typeId === 'personal');
    if (tk && tk.remaining > 0) tk.remaining--;
  }
  const note = useType==='ticket'?'パーソナルチケット使用':useType==='extra'?'エクストラチケット使用':'新規予約';
  opLogs.unshift({type:'reserved', date:TODAY, bkDate:S.rsvDate, time:S.rsvTime,
    courseName:cp?cp.courseName:'', trainerName:tr?tr.name:'おまかせ', note});
  S.rsvDate = null; S.rsvTime = null; S.rsvTrainerId = null;
  S.rsvUseTicket = false; S.rsvUseExtra = false;
  toast('✓ 予約が完了しました！'); goTab('home');
}

function renderHistory() {
  const all = [...bookings].sort((a,b) => a.date < b.date ? 1 : -1);

  const statusColor = {confirmed:'#1a8fc7', done:'#4caf50', cancelled:'#aaa'};
  const typeLabel   = {reserved:'新規予約', changed:'日時変更', cancelled:'キャンセル'};

  let html = `<div style="font-size:12px;font-weight:600;color:#1a8fc7;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #eee">操作ログ</div>`;
  html += opLogs.length
    ? opLogs.map(log => `<div class="log-item">
        <span class="log-type ${log.type}">${typeLabel[log.type]}</span>
        <div style="font-size:12px;font-weight:600;margin-top:2px">${log.bkDate} ${log.time}〜</div>
        <div style="font-size:11px;color:#888">${log.courseName}　${log.trainerName}　${log.note}</div>
        <div style="font-size:10px;color:#bbb;margin-top:2px">操作日：${log.date}</div>
      </div>`).join('')
    : `<div class="empty-msg">操作ログがありません</div>`;

  html += `<div style="font-size:12px;font-weight:600;color:#1a8fc7;margin:16px 0 10px;padding-top:14px;border-top:1px solid #eee">全予約一覧</div>`;
  html += all.length
    ? all.map(b => {
        const d = new Date(b.date), isPast = b.date < TODAY, canAct = b.status === 'confirmed' && !isPast;
        return `<div class="bk-item">
          <div class="bk-date-box">
            <div class="bk-date-m">${d.getMonth()+1}月</div>
            <div class="bk-date-d">${d.getDate()}</div>
            <div class="bk-date-w">${WDAYS[d.getDay()]}</div>
          </div>
          <div class="bk-info">
            <div class="bk-time">${b.time}〜</div>
            <div class="bk-course">${b.courseName}</div>
            <div class="bk-trainer">${b.trainerId?b.trainerName+'トレーナー':'おまかせ'}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
            <span style="font-size:11px;font-weight:500;color:${statusColor[b.status]}">${statusMap[b.status]}</span>
            ${canAct?`<button class="bk-action-btn change" onclick="openChangeModal(${b.id})">日時変更</button>
                      <button class="bk-action-btn cancel" onclick="openCancelModal(${b.id})">キャンセル</button>`:''}
          </div>
        </div>`;
      }).join('')
    : `<div class="empty-msg">履歴がありません</div>`;

  document.getElementById('history-list').innerHTML = html;
}

        <div><div style="font-size:11px;color:#888;font-weight:500">開始時間</div>${sel(timeOpts,f.time,'time',i)}</div>
        <div><div style="font-size:11px;color:#888;font-weight:500">祝日設定</div>${sel(SKIP_OPTS,f.skip||'none','skip',i)}</div>
      </div>
    </div>`).join('');

  document.getElementById('profile-main').innerHTML = `
    <div class="card">
      <button class="back-btn" onclick="renderProfile()">← 戻る</button>
      <div style="font-size:15px;font-weight:700;margin-bottom:6px">固定予約の変更申請</div>
      <div class="notice-box">申請後、スタッフが空き状況を確認のうえ確定します。確定まで現在の固定予約が継続します。</div>
      <div id="fixed-apply-rows">${rows}</div>
      ${S.applyFixed.length < 4
        ? `<button onclick="addFixedRow()" style="width:100%;padding:11px;border:1.5px dashed #1a8fc7;background:#f0f8ff;border-radius:10px;color:#1a8fc7;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:4px">＋ 固定予約を追加</button>`
        : ''}
      <button class="btn-primary" onclick="submitFixedApply()">この内容で申請する</button>
      <button class="btn-outline" onclick="renderProfile()">キャンセル</button>
    </div>`;
}

function addFixedRow() {
  S.applyFixed.push({dow:1, week:'every', time:'10:00', skip:'none', courseName:S.user.contract.courseName});
  renderFixedApplyForm();
}
function removeFixedRow(i) { S.applyFixed.splice(i, 1); renderFixedApplyForm(); }
function updateFixed(i, key, val) { S.applyFixed[i][key] = key === 'dow' ? parseInt(val) : val; }

function submitFixedApply() {
  if (!S.applyFixed.length) { toast('固定予約を1件以上設定してください'); return; }
  S.user.pendingFixedBookings = S.applyFixed.map(f => ({...f}));
  // TODO: API POST /api/members/${user.id}/fixed-apply
  renderProfile(); toast('✓ 固定予約の変更を申請しました');
}

function cancelFixedApply() {
  S.user.pendingFixedBookings = null;
  renderProfile(); toast('申請を取り消しました');
}

/* ============================================================
   ユーティリティ
============================================================ */
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function toast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

/* 初期化 */
renderLogin();
</script>
